name: PV Frontline - Auto Generate

on:
  schedule:
    # 毎日 JST 12:00 (UTC 3:00) - API費用削減のため1日1回に変更
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Checkout blog_engine
        uses: actions/checkout@v6
        with:
          repository: MuscleLove-777/blog-engine
          path: blog_engine

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Collect topics
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python topic_collector.py
        continue-on-error: true

      - name: Generate article and build site
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python generate_and_build.py

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./output/site
          publish_branch: gh-pages
          force_orphan: true
